    <link rel="stylesheet" type="text/css" href="/css/home.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/css/subscription-history.css">

</head>
<body>

<main>
    <div class="nav-bar">
        <div class="side-bar-container">
            <nav>
                <div class="side_navbar">
                    <div class="smart-wallet-nav-bar">

                            </svg>
                        </a>
                    </div>
                    <div class="func-block admin-func-block">
                        <span>Admin</span>
                        <a href="/admin/users">
                            <p>Users</p>

                            </svg>
                        </a>
                        <a href="/admin/clients" class="active">
                            <p>Clients</p>
                            <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                                <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M4.5 17H4a1 1 0 0 1-1-1 3 3 0 0 1 3-3h1m0-3.05A2.5 2.5 0 1 1 9 5.5M19.5 17h.5a1 1 0 0 0 1-1 3 3 0 0 0-3-3h-1m0-3.05a2.5 2.5 0 1 0-2-4.45m.5 13.5h-7a1 1 0 0 1-1-1 3 3 0 0 1 3-3h3a3 3 0 0 1 3 3 1 1 0 0 1-1 1Zm-1-9.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0Z"/>
                            </svg>
                        </a>
                        <a href="/admin/accounts">
                            <p>Accounts</p>
                            <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">

                            </svg>
                        </a>
                        <a href="/admin/reports">
                            <p>Reports</p>
                            <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                <path fill-rule="evenodd" d="M11 4.717c-2.286-.58-4.16-.756-7.045-.71A1.99 1.99 0 0 0 2 6v11c0 1.133.934 2.022 2.044 2.007 2.759-.038 4.5.16 6.956.791V4.717Zm2 15.081c2.456-.631 4.198-.829 6.956-.791A2.013 2.013 0 0 0 22 16.999V6a1.99 1.99 0 0 0-1.955-1.993c-2.885-.046-4.76.13-7.045.71v15.081Z" clip-rule="evenodd"/>
                            </svg>
                        </a>
                    </div>
                    <div class="func-block">
                        <a class="logout" href="/logout">
                            <p>Logout</p>
                            <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H8m12 0-4 4m4-4-4-4M9 4H7a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3h2"></path>

                </div>
            </nav>
        </div>
    </div>

    <div class="home-section">
        <div class="single-section-box subscriptions-container">

            <div class="table-header admin-table-header">

                <div class="table-actions">
                    <a href="/admin/clients/add" class="btn add-btn">+ Add Client</a>
                </div>
            </div>

            <table class="styled-table">
                <thead>
                <tr>
                    <th>CLIENT ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>EGN</th>
                    <th>Phone Number</th>
                    <th>Adress</th>
                    <th>City</th>
                    <th>Country</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="c : ${clients}">

                    <!-- ID (само текст) -->
                    <td th:text="${c.id}">1</td>

                    <!-- NAME -->
                    <td>
                        <input type="text"
                               name="name"
                               th:value="${c.name}"
                               class="edit-input"
                               th:attr="form=${'editForm-' + c.id}"
                               disabled>
                    </td>

                    <!-- LAST NAME -->
                    <td>
                        <input type="text"
                               name="lastName"
                               th:value="${c.lastName}"
                               class="edit-input"
                               th:attr="form=${'editForm-' + c.id}"
                               disabled>
                    </td>

                    <!-- EGN (НЕ editable) -->
                    <td th:text="${c.egn}"></td>

                    <!-- PHONE -->
                    <td>
                        <input type="text"
                               name="phoneNumber"
                               th:value="${c.phone}"
                               class="edit-input"
                               th:attr="form=${'editForm-' + c.id}"
                               disabled>
                    </td>

                    <!-- ADDRESS -->
                    <td>
                        <input type="text"
                               name="address"
                               th:value="${c.address}"
                               class="edit-input"
                               th:attr="form=${'editForm-' + c.id}"
                               disabled>
                    </td>

                    <!-- CITY (само текст) -->
                    <td>
                        <select name="cityId"
                                class="edit-input"
                                th:attr="form=${'editForm-' + c.id}"
                                disabled>
                            <option th:each="city : ${cities}"
                                    th:value="${city.id}"
                                    th:text="${city.cityName}"
                                    th:selected="${city.cityName == c.city}">
                            </option>
                        </select>
                    </td>

                    <!-- COUNTRY (само текст) -->
                    <td th:text="${c.country}"></td>

                    <td class="action-buttons">

                        <form th:id="${'editForm-' + c.id}"
                              th:action="@{/admin/clients/edit/{id}(id=${c.id})}"
                              method="post">
                        </form>

                        <button type="button"
                                class="btn edit-btn"
                                onclick="enableEdit(this)">
                            Edit
                        </button>

                        <button type="submit"
                                class="btn edit-btn save-btn"
                                th:attr="form=${'editForm-' + c.id}"
                                style="display:none;">
                            Save
                        </button>

                        <a th:href="@{/admin/clients/delete/{id}(id=${c.id})}"
                           class="btn delete-btn"
                           onclick="return confirm('Are you sure?')">
                            Delete
                        </a>

                    </td>

                </tr>
                </tbody>
            </table>

        </div>
    </div>

</main>
<script>
    function enableEdit(button) {
        const row = button.closest("tr");

        const inputs = row.querySelectorAll(".edit-input");
        inputs.forEach(input => input.disabled = false);

        button.style.display = "none";

        const saveBtn = row.querySelector(".save-btn");
        saveBtn.style.display = "inline-block";
    }
</script>
</body>
</html>
