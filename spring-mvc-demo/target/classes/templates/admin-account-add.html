<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="/css/common.css">
    <link rel="stylesheet" type="text/css" href="/css/form.css">
    <title>Add Account</title>
</head>
<body>

<main>
    <section class="section full-height">

        <form class="form" action="/admin/accounts/add" method="post">

            <label for="clientId">Client</label>
            <select id="clientId" name="clientId" required>
                <option value="">-- Select Client --</option>
                <option th:each="client : ${clients}"
                        th:value="${client.id}"
                        th:text="${client.name + ' ' + client.lastName + ' - EGN: ' + client.egn}">
                </option>
            </select>

            <label for="currencyId">Currency</label>
            <select id="currencyId" name="currencyId" required>
                <option value="">-- Select Currency --</option>
                <option th:each="currency : ${currencies}"
                        th:value="${currency.id}"
                        th:text="${currency.currencyShort + ' - ' + currency.currency}">
                </option>
            </select>

            <label for="availability">Availability</label>
            <input type="number"
                   step="0.01"
                   placeholder="Enter availability"
                   id="availability"
                   name="availability"
                   required>

            <label for="iban">IBAN</label>
            <input type="text"
                   placeholder="Enter IBAN"
                   id="iban"
                   name="iban"
                   required>

            <div class="error" th:if="${param.error == 'empty'}">
                All fields are required.
            </div>

            <div class="error" th:if="${param.error == 'ibanTaken'}">
                Account with this IBAN already exists.
            </div>

            <button type="submit">Add Account</button>

            <p class="form-already">
                Back to <a href="/admin/accounts">Accounts</a>
            </p>
        </form>

    </section>
    <div th:replace="~{fragments/error-popup :: popupMessages}"></div>
</main>

<div class="footer">
    <p>© 2026 Blackstone Bank. All rights reserved.</p>
</div>

</body>
</html>
