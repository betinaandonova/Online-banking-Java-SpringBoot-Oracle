<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="/css/common.css">
    <link rel="stylesheet" type="text/css" href="/css/form.css">
    <title>Add Client</title>
</head>
<body>

<main>
    <section class="section full-height">

        <form class="form" action="/admin/clients/add" method="post">

            <label for="name">First Name</label>
            <input type="text" placeholder="Enter first name" id="name" name="name" required>

            <label for="lastName">Last Name</label>
            <input type="text" placeholder="Enter last name" id="lastName" name="lastName" required>

            <label for="egn">EGN</label>
            <input type="text" placeholder="Enter EGN" id="egn" name="egn" required>

            <label for="phoneNumber">Phone Number</label>
            <input type="text" placeholder="Enter phone number" id="phoneNumber" name="phoneNumber" required>

            <label for="address">Address</label>
            <input type="text" placeholder="Enter address" id="address" name="address" required>

            <label for="cityId">City</label>
            <select id="cityId" name="cityId" required>
                <option value="">-- Select City --</option>
                <option th:each="city : ${cities}"
                        th:value="${city.id}"
                        th:text="${city.cityName + ' - ' + city.country.countryName}">
                </option>
            </select>

            <div class="error" th:if="${param.error == 'empty'}">
                All fields are required.
            </div>

            <div class="error" th:if="${param.error == 'egnTaken'}">
                Client with this EGN already exists.
            </div>

            <button type="submit">Add Client</button>
            <p class="form-already">
                Back to <a href="/admin/clients">Clients</a>
            </p>
        </form>

    </section>
</main>

<div class="footer">
    <p>© 2026 Blackstone Bank. All rights reserved.</p>
</div>

</body>
</html>
