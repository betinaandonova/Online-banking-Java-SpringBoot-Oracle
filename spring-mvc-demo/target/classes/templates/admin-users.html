<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="/css/common.css">
  <link rel="stylesheet" type="text/css" href="/css/nav-side-bar.css">
  <link rel="stylesheet" type="text/css" href="/css/home-common.css">
  <link rel="stylesheet" type="text/css" href="/css/home.css">
  <link rel="stylesheet" type="text/css" href="/css/subscription-history.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <title>Transactions</title>
</head>

<body>
<main>
  <div th:replace="~{fragments/admin-sidebar :: adminSidebar('users')}"></div>

  <div class="home-section">
    <div class="single-section-box subscriptions-container">

      <div class="table-header">
        <div class="table-actions">
          <a href="/admin/users/add" class="btn add-btn">+ Add User</a>
        </div>
      </div>

      <table class="styled-table">
        <thead>
        <tr>
          <th>USER ID</th>
          <th>Username</th>
          <th>PASSWORD</th>
          <th>ACTIONS</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="u : ${users}">

          <td th:text="${u.id}">1</td>

          <td>
            <input type="text"
                   name="username"
                   th:value="${u.username}"
                   class="edit-input"
                   th:attr="form=${'editForm-' + u.id}"
                   disabled>
          </td>

          <td>
            <input type="password"
                   name="password"
                   placeholder="new password"
                   class="edit-input"
                   th:attr="form=${'editForm-' + u.id}"
                   disabled>
          </td>

          <td class="action-buttons">

            <form th:id="${'editForm-' + u.id}"
                  th:action="@{/admin/users/edit/{id}(id=${u.id})}"
                  method="post">
            </form>

            <button type="button"
                    class="btn edit-btn"
                    onclick="enableEdit(this)">
              Edit
            </button>

            <button type="submit"
                    class="btn edit-btn save-btn"
                    th:attr="form=${'editForm-' + u.id}"
                    style="display:none;">
              Save
            </button>

            <a th:href="@{/admin/users/delete/{id}(id=${u.id})}"
               class="btn delete-btn"
               onclick="return confirm('Are you sure?')">
              Delete
            </a>

          </td>
        </tr>
        </tbody>
      </table>

    </div>
  </div>
</main>
<div class="footer"><p>© 2026 BSA Bank. All rights reserved.</p></div>
<script>
  function enableEdit(button) {
    const row = button.closest("tr");

    const inputs = row.querySelectorAll(".edit-input");
    inputs.forEach(input => input.disabled = false);

    button.style.display = "none";

    const saveBtn = row.querySelector(".save-btn");
    saveBtn.style.display = "inline-block";
  }
</script>
</body>
</html>
