<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="/css/common.css">
    <link rel="stylesheet" type="text/css" href="/css/form.css">
    <title>Add Currency</title>
</head>
<body>

<main>
    <section class="section full-height">

        <form class="form" action="/admin/currencies/add" method="post">

            <label for="currencyShort">Currency Short</label>
            <input type="text"
                   placeholder="Enter currency short"
                   id="currencyShort"
                   name="currencyShort"
                   required>

            <label for="currency">Currency Name</label>
            <input type="text"
                   placeholder="Enter currency name"
                   id="currency"
                   name="currency"
                   required>

            <div class="error" th:if="${param.error == 'empty'}">
                All fields are required.
            </div>

            <button type="submit">Add Currency</button>

            <p class="form-already">
                Back to <a href="/admin/currencies">Currencies</a>
            </p>
        </form>

    </section>
</main>

<div class="footer">
    <p>© 2026 Blackstone Bank. All rights reserved.</p>
</div>

</body>
</html>
