<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="/css/common.css">
    <link rel="stylesheet" type="text/css" href="/css/form.css">
    <title>Register</title>
</head>
<body>

<main>
    <section class="section full-height">

        <form class="form" action="/admin/users/add" method="post">

            <label for="clientId">Client</label>
            <select id="clientId" name="clientId" required>
                <option value="">-- Select Client --</option>
                <option th:each="c : ${clients}"
                        th:value="${c.id}"
                        th:text="${c.name + ' ' + c.lastName + ' (ID: ' + c.id + ')'}">
                </option>
            </select>

            <label for="username">Username</label>
            <input type="text" placeholder="Enter username" id="username" name="username" required>

            <label for="password">Password</label>
            <input type="password" placeholder="Enter password" id="password" name="password" required>

            <label for="repeatPassword">Repeat Password</label>
            <input type="password" placeholder="Repeat password" id="repeatPassword" name="repeatPassword" required>

            <div class="error" th:if="${param.error == 'usernameEmpty'}">
                Username is required
            </div>

            <div class="error" th:if="${param.error == 'passwordEmpty'}">
                Password is required
            </div>

            <div class="error" th:if="${param.error == 'usernameTaken'}">
                Username already exists
            </div>

            <div class="error" th:if="${param.error == 'passwordMismatch'}">
                Passwords do not match
            </div>


            <button type="submit">Register</button>
            <p class="form-already">Already have an account? <a href="/login">Login</a>!</p>
        </form>

    </section>
</main>

<div class="footer">
    <p>© 2026 Blackstone Bank. All rights reserved.</p>
</div>
</body>
</html>
