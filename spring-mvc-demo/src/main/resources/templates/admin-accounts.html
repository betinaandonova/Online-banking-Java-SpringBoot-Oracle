<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="/css/common.css">
    <link rel="stylesheet" type="text/css" href="/css/nav-side-bar.css">
    <link rel="stylesheet" type="text/css" href="/css/home-common.css">
    <link rel="stylesheet" type="text/css" href="/css/home.css">
    <link rel="stylesheet" type="text/css" href="/css/subscription-history.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Accounts</title>
</head>

<body>
<main>
    <div th:replace="~{fragments/admin-sidebar :: adminSidebar('accounts')}"></div>

    <div class="home-section">
        <div class="single-section-box subscriptions-container">

            <div class="table-header admin-table-header">

                <form th:action="@{/admin/accounts}" method="get" class="table-actions">

                    <input type="text"
                           name="searchValue"
                           th:value="${searchValue}"
                           placeholder="Search accounts..."
                           class="edit-input">

                    <button type="button"
                            class="btn edit-btn"
                            onclick="toggleFilters()">
                        Filters
                    </button>

                    <button type="submit" class="btn edit-btn">
                        Search
                    </button>

                    <a th:href="@{/admin/accounts}" class="btn delete-btn">
                        Clear
                    </a>

                    <div id="filtersPanel"
                         th:style="${searchType != null} ? 'display:block; margin-top: 12px;' : 'display:none; margin-top: 12px;'">
                        <select name="searchType" class="edit-input">
                            <option value="">Search by</option>

                            <option th:each="type : ${searchTypes}"
                                    th:value="${type.name()}"
                                    th:text="${type.label}"
                                    th:selected="${searchType != null and type.name() == searchType.name()}">
                            </option>
                        </select>
                    </div>
                </form>

                <div class="table-actions">
                    <a href="/admin/accounts/add" class="btn add-btn">+ Add Account</a>
                </div>
            </div>

            <table class="styled-table">
                <thead>
                <tr>
                    <th>ACCOUNT ID</th>
                    <th>CLIENT ID</th>
                    <th>Client Name</th>
                    <th>EGN</th>
                    <th>Phone Number</th>
                    <th>IBAN</th>
                    <th>Currency</th>
                    <th>Availability</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="a : ${accounts}">

                    <td th:text="${a.accountId}">1</td>

                    <td th:text="${a.clientId}">1</td>

                    <td th:text="${a.clientFullName}">Client Name</td>

                    <td th:text="${a.egn}">0000000000</td>

                    <td th:text="${a.phoneNumber}">0888888888</td>

                    <td th:text="${a.iban}">IBAN</td>

                    <td th:text="${a.currencyShort}">BGN</td>

                    <td>
                        <input type="number"
                               step="0.01"
                               name="availability"
                               th:value="${a.availability}"
                               class="edit-input"
                               th:attr="form=${'editForm-' + a.accountId}"
                               disabled>
                    </td>

                    <td class="action-buttons">

                        <form th:id="${'editForm-' + a.accountId}"
                              th:action="@{/admin/accounts/edit/{id}(id=${a.accountId})}"
                              method="post">
                        </form>

                        <button type="button"
                                class="btn edit-btn"
                                onclick="enableEdit(this)">
                            Edit
                        </button>

                        <button type="submit"
                                class="btn edit-btn save-btn"
                                th:attr="form=${'editForm-' + a.accountId}"
                                style="display:none;">
                            Save
                        </button>

                        <form th:action="@{/admin/accounts/delete/{id}(id=${a.accountId})}" method="post" class="delete-form">
                            <button type="button"
                                    class="btn delete-btn"
                                    th:attr="data-delete-name=${a.iban}"
                                    onclick="openDeleteModal(this)">
                                Delete
                            </button>
                        </form>

                    </td>

                </tr>
                </tbody>
            </table>

        </div>
    </div>

    <div th:replace="~{fragments/error-popup :: popupMessages}"></div>
    <div th:replace="~{fragments/confirm-delete-modal :: confirmDeleteModal}"></div>
</main>

<div class="footer"><p>© 2026 BSA Bank. All rights reserved.</p></div>

<script>
    function enableEdit(button) {
        const row = button.closest("tr");

        const availabilityInput = row.querySelector("input[name='availability']");
        availabilityInput.disabled = false;

        button.style.display = "none";

        const saveBtn = row.querySelector(".save-btn");
        saveBtn.style.display = "inline-block";
    }

    function toggleFilters() {
        const panel = document.getElementById("filtersPanel");
        panel.style.display = panel.style.display === "none" ? "block" : "none";
    }
</script>
</body>
</html>
