<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml"><head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="/css/common.css">
    <link rel="stylesheet" type="text/css" href="/css/nav-side-bar.css">
    <link rel="stylesheet" type="text/css" href="/css/home-common.css">
    <link rel="stylesheet" type="text/css" href="/css/home.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/css/subscription-history.css">
    <title>Home</title>
</head>
<body>

<main>
    <div th:replace="~{fragments/admin-sidebar :: adminSidebar('clients')}"></div>

    <div class="home-section">
        <div class="single-section-box subscriptions-container">

            <div class="table-header admin-table-header">

                <div class="table-actions">
                    <a href="/admin/clients/add" class="btn add-btn">+ Add Client</a>
                </div>
            </div>

            <table class="styled-table">
                <thead>
                <tr>
                    <th>CLIENT ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>EGN</th>
                    <th>Phone Number</th>
                    <th>Adress</th>
                    <th>City</th>
                    <th>Country</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="c : ${clients}">

                    <!-- ID (само текст) -->
                    <td th:text="${c.id}">1</td>

                    <!-- NAME -->
                    <td>
                        <input type="text"
                               name="name"
                               th:value="${c.name}"
                               class="edit-input"
                               th:attr="form=${'editForm-' + c.id}"
                               disabled>
                    </td>

                    <!-- LAST NAME -->
                    <td>
                        <input type="text"
                               name="lastName"
                               th:value="${c.lastName}"
                               class="edit-input"
                               th:attr="form=${'editForm-' + c.id}"
                               disabled>
                    </td>

                    <!-- EGN (НЕ editable) -->
                    <td th:text="${c.egn}"></td>

                    <!-- PHONE -->
                    <td>
                        <input type="text"
                               name="phoneNumber"
                               th:value="${c.phone}"
                               class="edit-input"
                               th:attr="form=${'editForm-' + c.id}"
                               disabled>
                    </td>

                    <!-- ADDRESS -->
                    <td>
                        <input type="text"
                               name="address"
                               th:value="${c.address}"
                               class="edit-input"
                               th:attr="form=${'editForm-' + c.id}"
                               disabled>
                    </td>

                    <!-- CITY (само текст) -->
                    <td>
                        <select name="cityId"
                                class="edit-input"
                                th:attr="form=${'editForm-' + c.id}"
                                disabled>
                            <option th:each="city : ${cities}"
                                    th:value="${city.id}"
                                    th:text="${city.cityName}"
                                    th:selected="${city.cityName == c.city}">
                            </option>
                        </select>
                    </td>

                    <!-- COUNTRY (само текст) -->
                    <td th:text="${c.country}"></td>

                    <td class="action-buttons">

                        <form th:id="${'editForm-' + c.id}"
                              th:action="@{/admin/clients/edit/{id}(id=${c.id})}"
                              method="post">
                        </form>

                        <button type="button"
                                class="btn edit-btn"
                                onclick="enableEdit(this)">
                            Edit
                        </button>

                        <button type="submit"
                                class="btn edit-btn save-btn"
                                th:attr="form=${'editForm-' + c.id}"
                                style="display:none;">
                            Save
                        </button>

                        <form th:action="@{/admin/clients/delete/{id}(id=${c.id})}"
                              method="post"
                              class="delete-form">

                            <button type="button"
                                    class="btn delete-btn"
                                    th:attr="data-delete-name=${c.name + ' ' + c.lastName}"
                                    onclick="openDeleteModal(this)">
                                Delete
                            </button>
                        </form>

                    </td>

                </tr>
                </tbody>
            </table>

        </div>
    </div>
    <div th:replace="~{fragments/error-popup :: popupMessages}"></div>
    <div th:replace="~{fragments/confirm-delete-modal :: confirmDeleteModal}"></div>
</main>
<script>
    function enableEdit(button) {
        const row = button.closest("tr");

        const inputs = row.querySelectorAll(".edit-input");
        inputs.forEach(input => input.disabled = false);

        button.style.display = "none";

        const saveBtn = row.querySelector(".save-btn");
        saveBtn.style.display = "inline-block";
    }
</script>
</body>
</html>
