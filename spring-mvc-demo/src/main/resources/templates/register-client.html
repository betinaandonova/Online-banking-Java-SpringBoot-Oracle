<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="/css/common.css">
    <link rel="stylesheet" type="text/css" href="/css/form.css">
    <title>Register</title>
</head>
<body>

<main>
    <section class="section full-height">

        <form class="form" action="/register-step1" method="post">

            <h3>Register Here</h3>

            <label for="name">First Name</label>
            <input type="text" placeholder="First Name" id="name" name="name" required>

            <label for="lastName">Last Name</label>
            <input type="text" placeholder="Last Name" id="lastName" name="lastName" required>

            <label for="egn">EGN</label>
            <input type="text" placeholder="EGN" id="egn" name="egn" maxlength="10" required>

            <label for="phoneNumber">Phone Number</label>
            <input type="text" placeholder="Phone Number" id="phoneNumber" name="phoneNumber" required>

            <label for="address">Address</label>
            <input type="text" placeholder="Address" id="address" name="address" required>

            <label for="city">City</label>
            <select id="city" name="cityId" required>
                <option value="">Select city</option>

                <option th:each="city : ${cities}"
                        th:value="${city.id}"
                        th:text="${city.cityName}">
                </option>
            </select>

            <button type="submit">Register</button>
            <p class="form-already">Already have an account? <a href="/login">Login</a>!</p>
        </form>

    </section>
</main>

<div class="footer">
    <p>© 2026 Blackstone Bank. All rights reserved.</p>
</div>
</body>
</html>
