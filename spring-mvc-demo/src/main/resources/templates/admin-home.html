<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml"><head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="/css/common.css">
  <link rel="stylesheet" type="text/css" href="/css/nav-side-bar.css">
  <link rel="stylesheet" type="text/css" href="/css/home-common.css">
  <link rel="stylesheet" type="text/css" href="/css/home.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <title>Home</title>
</head>
<body>

<main>
  <div th:replace="~{fragments/admin-sidebar :: adminSidebar('dashboard')}"></div>

  <div class="home-section">
    <div class="single-section-box home-profile-information">
      <div class="profile-header">
        <img src="/images/istockphoto-522855255-612x612.jpg" alt="Profile Picture" class="profile-avatar">
        <h2 class="profile-name" th:text="${profile.name + ' ' + profile.lastName}">Name</h2>
        <div class="profile-status-role-container">
          <p class="active-profile">ACTIVE</p>
        </div>
        <div class="profile-status-role-container">
          <p class="position-text"
             th:if="${profile.userType == 'EMPLOYEE'}"
             th:text="${profile.position}">
            POSITION
          </p>
        </div>
        <div class="details-section">
        </div>
      </div>
      <div class="profile-info">
        <div class="details-section-container">
          <p class="label">First and Last name:</p>
          <p th:text="${profile.name + ' ' + profile.lastName}">Name</p>
        </div>
        <div class="details-section-container">
          <p class="label">Phone Number: </p>
          <p th:text="${profile.phoneNumber}">Phone Number</p>
        </div>
      </div>
      <a href="/users/profile" class="profile-actions-button">
        <p>Edit Profile</p>
        <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 4h4m0 0v4m0-4-5 5M8 20H4m0 0v-4m0 4 5-5"></path>
        </svg>
      </a>
    </div>
  </div>



</main>
<div class="footer"><p>© 2026 BSA Bank. All rights reserved.</p></div>
</body>
</html>
